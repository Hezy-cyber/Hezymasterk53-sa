<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K53 Master SA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>K53 Master SA</h1>
  <p>South African Learner's Licence Practice Test</p>

  <div id="home">
    <h2>Select Licence Code</h2>

    <button onclick="startExam('Code 1')">🏍️ Code 1 - Motorcycle</button><br><br>

    <button onclick="startExam('Code 2')">🚗 Code 2 - Light Motor Vehicle</button><br><br>

    <button onclick="startExam('Code 3')">🚛 Code 3 - Heavy Motor Vehicle</button>
  </div>

  <div id="exam" style="display:none;">

    <h2 id="title"></h2>

    <h3 id="timer">60:00</h3>

    <div id="questionBox"></div>

    <br>

    <button onclick="previousQuestion()">Previous</button>

    <button onclick="nextQuestion()">Next</button>

    <br><br>

    <button onclick="submitExam()">Submit Exam</button>

  </div>

  <div id="result" style="display:none;">
      <h2>Result</h2>
      <p id="score"></p>

      <button onclick="location.reload()">Start Again</button>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
