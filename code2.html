<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code 2 Practice Test</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:20px;
}

.quiz-box{
    background:white;
    max-width:600px;
    margin:auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

button{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:16px;
    cursor:pointer;
}

#nextBtn{
    background:#0b5ed7;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="quiz-box">

<h2>🚗 Code 2 Practice</h2>

<h3 id="question"></h3>
<p id="counter"></p>
<div id="answers"></div>

<button id="nextBtn" onclick="nextQuestion()">Next</button>

<h2 id="score"></h2>

</div>

    <script>

const quiz = [
{
question:"What is the general speed limit in an urban area unless otherwise indicated?",
answers:["60 km/h","80 km/h","100 km/h"],
correct:0
},
{
question:"What does a red traffic light mean?",
answers:["Proceed carefully","Stop","Yield"],
correct:1
},
{
question:"What must you do before changing lanes?",
answers:["Sound your horn","Check mirrors and blind spot","Increase speed"],
correct:1
}
];

let current = 0;
let marks = 0;

function loadQuestion(){

if(current >= quiz.length){
document.getElementById("question").style.display="none";
document.getElementById("answers").style.display="none";
document.getElementById("nextBtn").style.display="none";
document.getElementById("counter").style.display="none";
document.getElementById("score").innerHTML="Your score: "+marks+" / "+quiz.length;
return;
}

document.getElementById("counter").innerHTML =
"Question " + (current + 1) + " of " + quiz.length;

document.getElementById("question").innerHTML = quiz[current].question;

let html = "";

quiz[current].answers.forEach((a,index)=>{
html += `<button onclick="checkAnswer(${index})">${a}</button>`;
});

document.getElementById("answers").innerHTML = html;

}

function checkAnswer(answer){

const buttons = document.querySelectorAll("#answers button");
buttons.forEach(btn => btn.disabled = true);

if(answer === quiz[current].correct){
marks++;
alert("✅ Correct!");
}else{
alert("❌ Wrong!");
}

current++;
setTimeout(loadQuestion,500);

}

function nextQuestion(){}

loadQuestion();

</script>
